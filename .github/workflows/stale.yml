name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: 'This issue has been marked as stale because it has been inactive for 30 days. It will be closed in 7 days if no further activity occurs.'
          stale-pr-message: 'This pull request has been marked as stale because it has been inactive for 30 days. It will be closed in 7 days if no further activity occurs.'
          close-issue-message: 'This issue has been closed because it has been marked as stale for 7 days with no further activity.'
          close-pr-message: 'This pull request has been closed because it has been marked as stale for 7 days with no further activity.'